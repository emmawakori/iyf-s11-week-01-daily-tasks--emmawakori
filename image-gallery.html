<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .gallery-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #333;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 6px blueviolet;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.05);
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .image-caption {
            padding: 10px;
            background-color: blue;
            color: white;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="gallery-container">
        <h1>Photo Gallery</h1>
        <div class="gallery-grid">
            <figure class="gallery-item">
                <img src="https://via.placeholder.com/300x250?text=Photo+1" alt="Gallery photo 1">
                <figcaption>Photo 1</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="https://via.placeholder.com/300x250?text=Photo+2" alt="Gallery photo 2">
                <figcaption>Photo 2</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="https://via.placeholder.com/300x250?text=Photo+3" alt="Gallery photo 3">
                <figcaption>Photo 3</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="https://via.placeholder.com/300x250?text=Photo+4" alt="Gallery photo 4">
                <figcaption>Photo 4</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="https://via.placeholder.com/300x250?text=Photo+5" alt="Gallery photo 5">
                <figcaption>Photo 5</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="https://via.placeholder.com/300x250?text=Photo+6" alt="Gallery photo 6">
                <figcaption>Photo 6</figcaption>
            </figure>
        </div>
    </div>
</body>
</html>
